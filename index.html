<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>思想コンテンツサポート</title>

<style>
body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  background: #f5f5f5;
  margin: 0;
  padding: 0;
}

.container {
  max-width: 420px;
  margin: 40px auto;
  background: #fff;
  border-radius: 16px;
  overflow: hidden;
  box-shadow: 0 8px 24px rgba(0,0,0,0.08);
}

.content {
  padding: 28px 24px;
}

.title {
  font-size: 24px;
  font-weight: 700;
  text-align: center;
  margin-bottom: 20px;
  line-height: 1.4;
  color: #111;
}

.text {
  font-size: 14px;
  line-height: 2;
  color: #444;
  margin-bottom: 20px;
}

.guide {
  background: #f8f8f8;
  border-radius: 12px;
  padding: 16px;
  font-size: 14px;
  line-height: 1.9;
  color: #444;
  margin-bottom: 24px;
}

.guide strong {
  display: block;
  font-size: 15px;
  margin-bottom: 10px;
  color: #222;
}

.keyword {
  display: inline-block;
  font-size: 18px;
  font-weight: 700;
  color: #222;
  background: #fff3cd;
  padding: 2px 8px;
  border-radius: 8px;
}

.btn {
  display: block;
  width: 100%;
  box-sizing: border-box;
  text-align: center;
  background: #06C755;
  color: #fff;
  text-decoration: none;
  padding: 14px;
  border-radius: 10px;
  font-weight: bold;
  font-size: 14px;
}

.btn:hover {
  opacity: 0.9;
}
</style>
</head>

<body>

<div class="container">
  <div class="content">
    <div class="title">思想コンテンツサポート</div>

    <div class="text">
      現在準備中です。<br>
      先行案内は公式LINEで受け取れます。
    </div>

    <div class="guide">
      <strong>登録後の流れ</strong>
      公式LINEに登録後、<br>
      <span class="keyword">「思想コンテンツサポート」</span> とメッセージを送信してください。<br>
      確認後、順番にご案内いたします。
    </div>

    <a href="https://line.me/R/ti/p/@479rnxap" class="btn" id="btn-bottom">
      公式LINEに登録する
    </a>
  </div>
</div>

<script>
  const urlParams = new URLSearchParams(window.location.search);
  const referrer = urlParams.get('ref') || 'direct';

  const gasUrl = "https://script.google.com/macros/s/AKfycbxeLw4JEGQseXcqub9e9yLTkmwkKF_AIoZtopKQQ9IhyFdrteP7kGMRc-P6TtKg7Ocd/exec";
  const serviceName = "shisou";

  function trackAndGo(e) {
    e.preventDefault();

    const trackUrl = `${gasUrl}?src=${serviceName}&ref=${referrer}`;
    fetch(trackUrl, {
      mode: 'no-cors',
      keepalive: true
    });

    const message = encodeURIComponent(`思想コンテンツサポート ${referrer}`);
    const lineLink = `https://line.me/R/oaMessage/@479rnxap/?${message}`;

    window.location.href = lineLink;
  }

  document.getElementById('btn-bottom').addEventListener('click', trackAndGo);
</script>

</body>
</html>
