<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>go</title>

<style>
body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  background: #f5f5f5;
  margin: 0;
  padding: 0;
}

.container {
  max-width: 420px;
  margin: 40px auto;
  background: #fff;
  border-radius: 16px;
  overflow: hidden;
  box-shadow: 0 8px 24px rgba(0,0,0,0.08);
}

.image img {
  width: 100%;
  height: auto;
  display: block;
}

.content {
  padding: 20px;
}

.title {
  font-size: 18px;
  font-weight: bold;
  margin-bottom: 12px;
}

.text {
  font-size: 14px;
  line-height: 1.8;
  color: #444;
  margin-bottom: 20px;
}

.btn {
  display: block;
  text-align: center;
  background: #06C755;
  color: #fff;
  text-decoration: none;
  padding: 14px;
  border-radius: 10px;
  font-weight: bold;
  font-size: 14px;
}

.btn:hover {
  opacity: 0.9;
}
</style>

</head>

<body>

<div class="container">

  <div class="image">
    <img src="画像URL" alt="">
  </div>

  <div class="content">
    <div class="title">思想コンテンツサポート</div>

    <div class="text">
      現在準備中です。<br>
      先行案内は公式LINEで受け取れます。
    </div>

    <a href="https://あなたのLINEリンク" class="btn">
      公式LINEに登録する
    </a>
  </div>

</div>

</body>
</html>
